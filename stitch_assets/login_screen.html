<h2 class="font-headline-lg text-headline-lg text-primary mb-sm leading-tight">Elevate your learning experience.</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Access your courses, tasks, and notifications in one seamless environment.</p>
</div>
</div>

<div class="w-full lg:w-1/2 flex items-center justify-center p-margin bg-background">
<div class="w-full max-w-[420px]">
<!-- Brand / Logo Area -->
<div class="flex items-center justify-center mb-lg">
<div class="w-16 h-16 rounded-2xl bg-surface-container-high flex items-center justify-center text-primary mb-md shadow-[0_4px_20px_rgba(0,0,0,0.02)]">

<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-xs">Welcome back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your details to sign in.</p>
</div>

<form class="flex flex-col gap-md">
<!-- Username Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">person</span>
<input class="w-full pl-[40px] pr-sm py-sm font-body-md text-body-md bg-surface-container-lowest border border-outline-variant rounded focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary-container transition-all placeholder:text-outline" id="username" placeholder="Enter your username" type="text">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">lock</span>
<input class="w-full pl-[40px] pr-sm py-sm font-body-md text-body-md bg-surface-container-lowest border border-outline-variant rounded focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary-container transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password">
</div>
</div>

<div class="flex items-center justify-between mt-xs mb-sm">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary-container cursor-pointer transition-colors" type="checkbox">
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-primary transition-colors">Keep sign in</span>
</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors focus:outline-none focus:underline" href="#">Forgot Password?</a>
</div>

<button class="w-full py-[14px] bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-inverse-surface transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-base" type="submit">
                        Log in
